<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Programmation</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1E1F25;color:#E8E8EC;min-height:100vh;padding:2rem 1rem}
  .container{max-width:900px;margin:0 auto}

  /* LOGIN */
  #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:1.5rem}
  .login-box{background:#2C2D34;border:1px solid #3A3B44;border-radius:16px;padding:2.5rem;width:100%;max-width:360px;text-align:center}
  .login-logo{width:52px;height:52px;background:#E8650A;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem}
  .login-logo svg{width:26px;height:26px;fill:white}
  .login-title{font-size:20px;font-weight:600;color:#fff;margin-bottom:4px}
  .login-sub{font-size:13px;color:#6A6B76;margin-bottom:1.5rem}
  .input-group{position:relative;margin-bottom:1rem}
  .input-group input{width:100%;background:#1E1F25;border:1px solid #3A3B44;border-radius:10px;padding:12px 14px;font-size:14px;color:#E8E8EC;outline:none;transition:border-color .2s}
  .input-group input:focus{border-color:#E8650A}
  .btn-primary{width:100%;background:#E8650A;color:white;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
  .btn-primary:hover{opacity:.88}
  .login-error{color:#ff6b6b;font-size:12px;margin-top:8px;display:none}

  /* HEADER */
  #admin-screen{display:none}
  .adm-header{background:#2C2D34;border-radius:16px;padding:1.5rem 2rem;margin-bottom:1.25rem;border:1px solid #3A3B44;display:flex;align-items:center;justify-content:space-between}
  .adm-header-left{display:flex;align-items:center;gap:12px}
  .adm-logo{width:42px;height:42px;background:#E8650A;border-radius:10px;display:flex;align-items:center;justify-content:center}
  .adm-logo svg{width:22px;height:22px;fill:white}
  .adm-title{font-size:18px;font-weight:600;color:#fff}
  .adm-sub{font-size:12px;color:#6A6B76;margin-top:2px}
  .adm-actions{display:flex;gap:8px}
  .btn-save{background:#E8650A;color:white;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
  .btn-save:hover{opacity:.88}
  .btn-logout{background:transparent;color:#6A6B76;border:1px solid #3A3B44;border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer;transition:all .2s}
  .btn-logout:hover{border-color:#6A6B76;color:#C8C9D4}

  /* STATUS BAR */
  .status-bar{background:#23242B;border:1px solid #3A3B44;border-radius:10px;padding:10px 16px;margin-bottom:1.25rem;font-size:12px;color:#6A6B76;display:flex;align-items:center;gap:8px}
  .status-dot{width:7px;height:7px;border-radius:50%;background:#4CAF50;flex-shrink:0}
  .status-dot.loading{background:#E8650A;animation:pulse 1s infinite}
  .status-dot.error{background:#ff6b6b}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* DAY CARDS */
  .day-card{background:#2C2D34;border-radius:14px;border:1px solid #3A3B44;margin-bottom:1rem;overflow:hidden}
  .day-header{background:#23242B;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #3A3B44;cursor:pointer;user-select:none}
  .day-header:hover{background:#262730}
  .day-header-left{display:flex;align-items:center;gap:10px}
  .day-title-txt{font-size:15px;font-weight:600;color:#fff}
  .day-pill{background:#E8650A;color:white;font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px}
  .chevron{color:#6A6B76;font-size:14px;transition:transform .2s}
  .chevron.open{transform:rotate(90deg)}
  .day-body{padding:16px 18px;display:none}
  .day-body.open{display:block}

  /* SECTION */
  .section-block{margin-bottom:16px}
  .section-block:last-child{margin-bottom:0}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #3A3B44}
  .section-name-input{background:transparent;border:none;color:#E8650A;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;outline:none;width:auto;min-width:60px}
  .section-name-input:focus{border-bottom:1px solid #E8650A}
  .btn-add-ex{background:transparent;color:#E8650A;border:1px dashed #E8650A44;border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;transition:all .2s}
  .btn-add-ex:hover{background:#E8650A18;border-color:#E8650A}

  /* EXERCISE ROW */
  .ex-edit-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #2A2B32}
  .ex-edit-row:last-child{border-bottom:none}
  .drag-handle{color:#3A3B44;cursor:grab;font-size:16px;flex-shrink:0;line-height:1}
  .drag-handle:active{cursor:grabbing}
  .ex-name-input{flex:1;background:#1E1F25;border:1px solid #3A3B44;border-radius:7px;padding:6px 10px;font-size:13px;color:#C8C9D4;outline:none;transition:border-color .2s}
  .ex-name-input:focus{border-color:#E8650A}
  .ex-sets-input{width:52px;background:#1E1F25;border:1px solid #3A3B44;border-radius:7px;padding:6px 8px;font-size:12px;color:#E8650A;font-weight:600;outline:none;text-align:center;transition:border-color .2s}
  .ex-sets-input:focus{border-color:#E8650A}
  .btn-del-ex{background:transparent;border:none;color:#3A3B44;font-size:16px;cursor:pointer;padding:2px 4px;transition:color .2s;flex-shrink:0}
  .btn-del-ex:hover{color:#ff6b6b}

  /* ADD SECTION */
  .btn-add-section{width:100%;background:transparent;border:1px dashed #3A3B44;border-radius:8px;padding:10px;color:#6A6B76;font-size:12px;cursor:pointer;margin-top:12px;transition:all .2s}
  .btn-add-section:hover{border-color:#E8650A44;color:#E8650A}

  /* TOAST */
  .toast{position:fixed;bottom:24px;right:24px;background:#2C2D34;border:1px solid #3A3B44;border-radius:10px;padding:12px 20px;font-size:13px;color:#C8C9D4;display:flex;align-items:center;gap:8px;transform:translateY(80px);opacity:0;transition:all .3s;z-index:100}
  .toast.show{transform:translateY(0);opacity:1}
  .toast-dot{width:7px;height:7px;border-radius:50%;background:#4CAF50;flex-shrink:0}
  .toast-dot.err{background:#ff6b6b}

  /* LINK TO MAIN */
  .view-link{display:block;text-align:center;margin-bottom:1.5rem;font-size:13px;color:#6A6B76;text-decoration:none}
  .view-link:hover{color:#E8650A}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <svg viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29l-1.43-1.43z"/></svg>
    </div>
    <div class="login-title">Panneau Admin</div>
    <div class="login-sub">Programmation Hypertrophie</div>
    <div class="input-group">
      <input type="password" id="pw-input" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-primary" onclick="login()">Accéder</button>
    <div class="login-error" id="login-error">Mot de passe incorrect</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <div class="container">
    <a href="index.html" class="view-link">← Voir la programmation</a>
    <div class="adm-header">
      <div class="adm-header-left">
        <div class="adm-logo">
          <svg viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29l-1.43-1.43z"/></svg>
        </div>
        <div>
          <div class="adm-title">Éditeur de programmation</div>
          <div class="adm-sub">Modifie les exercices, charges et séries</div>
        </div>
      </div>
      <div class="adm-actions">
        <button class="btn-save" onclick="saveData()">💾 Sauvegarder</button>
        <button class="btn-logout" onclick="logout()">Déconnexion</button>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-txt">Chargement des données...</span>
    </div>

    <div id="days-editor"></div>
  </div>
</div>

<div class="toast" id="toast">
  <div class="toast-dot" id="toast-dot"></div>
  <span id="toast-msg"></span>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
// Change ce mot de passe avant de déployer !
const PASSWORD = 'coach2024';

// URL de ta Netlify Function (à créer — voir README)
const API_BASE = '/.netlify/functions/prog';

// ─── DONNÉES PAR DÉFAUT ───────────────────────────────────────────────────────
const DEFAULT_DATA = {
  days: [
    {
      id: 'lundi', title: 'Lundi', pill: 'Séance A',
      sections: [
        { name: 'Épaules', exercises: [
          { name: 'Élévations latérales poulie basse', sets: 'x3' },
          { name: 'Développé militaire machine ou haltères', sets: 'x3' }
        ]},
        { name: 'Dos', exercises: [
          { name: 'Low row', sets: 'x3' }
        ]},
        { name: 'Pectoraux', exercises: [
          { name: 'Développé couché guidé (debout)', sets: 'x3' }
        ]},
        { name: 'Jambes', exercises: [
          { name: 'Leg extension', sets: 'x3' }
        ]},
        { name: 'Mollets', exercises: [
          { name: 'Mollets donkey raise', sets: 'x3' }
        ]}
      ]
    },
    {
      id: 'mardi', title: 'Mardi', pill: 'Séance B',
      sections: [
        { name: 'Épaules', exercises: [
          { name: 'Élévations latérales haltères (debout)', sets: 'x3' },
          { name: 'Élévations frontales haltères', sets: 'x3' }
        ]},
        { name: 'Pectoraux', exercises: [
          { name: 'Développé convergent', sets: 'x3' }
        ]},
        { name: 'Jambes', exercises: [
          { name: 'Pendulum squat', sets: 'x2' },
          { name: 'Leg curl assis', sets: 'x3' }
        ]},
        { name: 'Mollets', exercises: [
          { name: 'Mollets presse', sets: 'x3' }
        ]}
      ]
    },
    {
      id: 'jeudi', title: 'Jeudi', pill: 'Séance C',
      sections: [
        { name: 'Épaules', exercises: [
          { name: 'Élévations latérales poulie hanche', sets: 'x3' }
        ]},
        { name: 'Pectoraux', exercises: [
          { name: 'Pec deck', sets: 'x3' }
        ]},
        { name: 'Dos', exercises: [
          { name: 'Tirage vertical convergent', sets: 'x3' }
        ]},
        { name: 'Jambes', exercises: [
          { name: 'RDL', sets: 'x2' },
          { name: 'Leg extension', sets: 'x3' }
        ]},
        { name: 'Mollets', exercises: [
          { name: 'Mollets assis', sets: 'x3' }
        ]}
      ]
    },
    {
      id: 'vendredi', title: 'Vendredi', pill: 'Séance D',
      sections: [
        { name: 'Épaules', exercises: [
          { name: 'Élévations latérales haltères sur banc incliné', sets: 'x3' },
          { name: 'Élévations frontales haltères', sets: 'x3' }
        ]},
        { name: 'Dos', exercises: [
          { name: 'Tirage horizontal', sets: 'x3' },
          { name: 'T-Bar prise large', sets: 'x3' }
        ]},
        { name: 'Jambes', exercises: [
          { name: 'Pendulum squat', sets: 'x2' },
          { name: 'Leg curl assis', sets: 'x3' }
        ]}
      ]
    }
  ]
};

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function login() {
  const pw = document.getElementById('pw-input').value;
  if (pw === PASSWORD) {
    sessionStorage.setItem('admin_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
  }
}

function logout() {
  sessionStorage.removeItem('admin_auth');
  location.reload();
}

// Auto-login si session active
if (sessionStorage.getItem('admin_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
}

// ─── DATA ─────────────────────────────────────────────────────────────────────
let progData = null;

async function loadData() {
  setStatus('loading', 'Connexion à Netlify Blobs...');
  try {
    const r = await fetch(API_BASE + '?action=get');
    if (r.ok) {
      const d = await r.json();
      progData = d;
      setStatus('ok', 'Données chargées depuis Netlify Blobs');
    } else {
      throw new Error();
    }
  } catch {
    // Pas encore de Function déployée → on utilise les données par défaut
    progData = JSON.parse(JSON.stringify(DEFAULT_DATA));
    setStatus('ok', 'Mode local (déploie la Function pour la persistence multi-appareils)');
  }
  renderEditor();
}

async function saveData() {
  const data = collectData();
  setStatus('loading', 'Sauvegarde en cours...');
  try {
    const r = await fetch(API_BASE + '?action=set', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    if (r.ok) {
      setStatus('ok', 'Sauvegardé avec succès');
      showToast('Programmation sauvegardée ✓', false);
    } else throw new Error();
  } catch {
    // Fallback local
    localStorage.setItem('prog_data', JSON.stringify(data));
    setStatus('ok', 'Sauvegardé localement (Function non disponible)');
    showToast('Sauvegardé en local (vois le README pour Netlify Blobs)', true);
  }
}

// ─── COLLECT DATA ─────────────────────────────────────────────────────────────
function collectData() {
  const days = [];
  document.querySelectorAll('.day-card-edit').forEach(card => {
    const dayId = card.dataset.dayId;
    const orig = progData.days.find(d => d.id === dayId) || {};
    const sections = [];
    card.querySelectorAll('.section-block').forEach(sb => {
      const secName = sb.querySelector('.section-name-input').value;
      const exercises = [];
      sb.querySelectorAll('.ex-edit-row').forEach(row => {
        const name = row.querySelector('.ex-name-input').value.trim();
        const sets = row.querySelector('.ex-sets-input').value.trim();
        if (name) exercises.push({ name, sets });
      });
      if (secName) sections.push({ name: secName, exercises });
    });
    days.push({ id: dayId, title: orig.title || dayId, pill: orig.pill || '', sections });
  });
  return { days };
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderEditor() {
  const container = document.getElementById('days-editor');
  container.innerHTML = '';
  progData.days.forEach(day => {
    container.appendChild(buildDayCard(day));
  });
}

function buildDayCard(day) {
  const card = document.createElement('div');
  card.className = 'day-card day-card-edit';
  card.dataset.dayId = day.id;

  const totalEx = day.sections.reduce((s, sec) => s + sec.exercises.length, 0);
  const totalSets = day.sections.reduce((s, sec) =>
    s + sec.exercises.reduce((ss, ex) => ss + (parseInt(ex.sets?.replace('x','')) || 0), 0), 0);

  card.innerHTML = `
    <div class="day-header" onclick="toggleDay(this)">
      <div class="day-header-left">
        <span class="day-title-txt">${day.title}</span>
        <span class="day-pill">${day.pill}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:11px;color:#6A6B76">${totalEx} exercices · ${totalSets} séries</span>
        <span class="chevron">›</span>
      </div>
    </div>
    <div class="day-body" id="body-${day.id}">
      <div class="sections-container"></div>
      <button class="btn-add-section" onclick="addSection('${day.id}')">+ Ajouter une section</button>
    </div>
  `;

  const secContainer = card.querySelector('.sections-container');
  day.sections.forEach(sec => secContainer.appendChild(buildSection(sec)));

  return card;
}

function buildSection(sec) {
  const div = document.createElement('div');
  div.className = 'section-block';
  div.innerHTML = `
    <div class="section-header">
      <input class="section-name-input" value="${esc(sec.name)}" placeholder="Groupe musculaire">
      <button class="btn-add-ex" onclick="addExercise(this)">+ Exercice</button>
    </div>
    <div class="ex-list"></div>
  `;
  const exList = div.querySelector('.ex-list');
  sec.exercises.forEach(ex => exList.appendChild(buildExRow(ex)));
  return div;
}

function buildExRow(ex) {
  const row = document.createElement('div');
  row.className = 'ex-edit-row';
  row.draggable = true;
  row.innerHTML = `
    <span class="drag-handle" title="Glisser pour réordonner">⠿</span>
    <input class="ex-name-input" value="${esc(ex.name)}" placeholder="Nom de l'exercice">
    <input class="ex-sets-input" value="${esc(ex.sets)}" placeholder="x3" title="Séries (ex: x3, 4x10)">
    <button class="btn-del-ex" onclick="delExercise(this)" title="Supprimer">×</button>
  `;
  setupDrag(row);
  return row;
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function toggleDay(header) {
  const body = header.nextElementSibling;
  const chev = header.querySelector('.chevron');
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function addExercise(btn) {
  const exList = btn.closest('.section-block').querySelector('.ex-list');
  exList.appendChild(buildExRow({ name: '', sets: 'x3' }));
  exList.lastElementChild.querySelector('.ex-name-input').focus();
}

function delExercise(btn) {
  btn.closest('.ex-edit-row').remove();
}

function addSection(dayId) {
  const container = document.querySelector(`[data-day-id="${dayId}"] .sections-container`);
  const sec = buildSection({ name: 'Nouveau groupe', exercises: [{ name: '', sets: 'x3' }] });
  container.appendChild(sec);
  sec.querySelector('.section-name-input').focus();
}

// ─── DRAG & DROP (réordonner les exercices) ────────────────────────────────────
let dragSrc = null;
function setupDrag(row) {
  row.addEventListener('dragstart', e => { dragSrc = row; row.style.opacity = '.4'; });
  row.addEventListener('dragend', () => { dragSrc = null; row.style.opacity = '1'; });
  row.addEventListener('dragover', e => { e.preventDefault(); });
  row.addEventListener('drop', e => {
    e.preventDefault();
    if (dragSrc && dragSrc !== row && dragSrc.closest('.ex-list') === row.closest('.ex-list')) {
      const list = row.closest('.ex-list');
      const kids = [...list.children];
      const si = kids.indexOf(dragSrc), ti = kids.indexOf(row);
      if (si < ti) list.insertBefore(dragSrc, row.nextSibling);
      else list.insertBefore(dragSrc, row);
    }
  });
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
function setStatus(type, msg) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (type === 'loading' ? ' loading' : type === 'error' ? ' error' : '');
  document.getElementById('status-txt').textContent = msg;
}

function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  document.getElementById('toast-dot').className = 'toast-dot' + (isErr ? ' err' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function esc(s) {
  return (s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

// Init si session déjà active
if (sessionStorage.getItem('admin_auth') === '1') loadData();
</script>
</body>
</html>
